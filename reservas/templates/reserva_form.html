{% extends "principal.html" %}

{% block title %}Nova Reserva | Chalé Admin{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
  <div>
    <h2 class="section-title mb-1">Agendar Reserva</h2>
    <p class="muted mb-0">Crie uma nova reserva futura.</p>
  </div>
</div>

<div class="row">
  <div class="col-xl-6">
    <article class="panel">
      <div class="panel-body">
        <form method="post">
          {% csrf_token %}
          <table class="table-form">
            {{ form.as_table }}
          </table>
          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-brand">Salvar Reserva</button>
            <a href="{% url 'reservas:list' %}" class="btn btn-soft">Voltar</a>
          </div>
        </form>
      </div>
    </article>
  </div>
</div>
{% endblock %}
