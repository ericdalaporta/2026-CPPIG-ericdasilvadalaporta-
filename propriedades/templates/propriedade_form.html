{% extends "principal.html" %}

{% block title %}Nova Propriedade | Chalé Admin{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
  <div>
    <h2 class="section-title mb-1">Cadastrar Propriedade</h2>
    <p class="muted mb-0">Adicione um novo chalé ou portão residencial.</p>
  </div>
</div>

<div class="row">
  <div class="col-xl-6">
    <article class="panel">
      <div class="panel-body">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-brand">Salvar Propriedade</button>
            <a href="{% url 'propriedades:list' %}" class="btn btn-soft">Voltar</a>
          </div>
        </form>
      </div>
    </article>
  </div>
</div>
{% endblock %}
